stages:
  - build
  - test
  - analyze

variables:
  MAVEN_CLI_OPTS: "-s .m2/settings.xml --batch-mode"

# Etapa de compilación
build:
  stage: build
  script:
    - mvn $MAVEN_CLI_OPTS clean compile
  only:
    - merge_requests

# Etapa de pruebas
test:
  stage: test
  script:
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    when: always
    reports:
      junit: target/surefire-reports/TEST-*.xml
  only:
    - merge_requests

# Análisis estático con Checkstyle (o PMD si prefieren)
analyze:
  stage: analyze
  script:
    - mvn $MAVEN_CLI_OPTS checkstyle:checkstyle
  artifacts:
    paths:
      - target/checkstyle-result.xml
  only:
    - merge_requests
