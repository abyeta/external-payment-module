variables:
  MAVEN_CLI_OPTS: >-
    --batch-mode
    --errors
    --fail-at-end
    --show-version
    --no-transfer-progress
    -DinstallAtEnd=true
    -DdeployAtEnd=true
    -U
    -X

image: maven:3-openjdk-17

stages:
  - build
  - test
  - coverage
  - deploy

cache:
  paths:
    - .m2/repository
  key: "$CI_JOB_NAME"

build:
  stage: build
  script:
    - echo "Build"
    - mvn clean install -DskipTests --settings ci_settings.xml
  artifacts:
    paths:
      - target/ 

test:
  stage: test
  script:
    - echo "Test"
    - mvn test --settings ci_settings.xml
  artifacts:
    paths:
      - target/   

checkstyle:  
  stage: test  
  script:
    - echo "Checkstyle and linting testing."
    - mvn checkstyle:check
    

coverage:
  stage: coverage
  script:
    - echo "Coverage"
    - 'mvn clean verify'

deploy:
  stage: deploy
  script:
    - echo "Deployment"
    - 'mvn deploy -DskipTests --settings ci_settings.xml'