image: maven:3.9.4-openjdk-17-slim

stages:
  - build
  - test

build_dependencies:
  stage: build
  script:
    - echo "Clonando y construyendo commons-module..."
    - git clone https://gitlab.com/jala-university1/cohort-4/oficial-es-desarrollo-de-software-2-cssd-125.ga.t1.25.m2/secci-n-a/capstone/commons-module.git
    - cd commons-module
    - mvn clean install
    - cd ..
    - echo "Clonando y construyendo account-module..."
    - git clone https://gitlab.com/jala-university1/cohort-4/oficial-es-desarrollo-de-software-2-cssd-125.ga.t1.25.m2/secci-n-a/capstone/account-module.git
    - cd account-module
    - mvn clean install
    - cd ..

build_external_payment_module:
  stage: build
  script:
    - echo "Construyendo external-payment-module..."
    - mvn clean package

test:
  stage: test
  script:
    - echo "Ejecutando pruebas unitarias..."
    - mvn test
