
variables:
#   MAVEN_OPTS: >-
#     -Dhttps.protocols=TLSv1.2
#     -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
#     -Dorg.slf4j.simpleLogger.showDateTime=true
#     -Djava.awt.headless=true
  MAVEN_CLI_OPTS: >-
    --batch-mode
    --errors
    --fail-at-end
    --show-version
    --no-transfer-progress
    -DinstallAtEnd=true
    -DdeployAtEnd=true
    -U
    -X

image: maven:3-openjdk-17

stages:
  - build
  - test
 # - deploy

before_script:
  - mkdir -p ~/.m2
  - echo "<settings>
      <servers>
        <server>
          <id>commons-module-repo</id>
          <username>${MAVEN_USERNAME}</username>
          <password>${MAVEN_PASSWORD}</password>
        </server>
      </servers>
    </settings>" > ~/.m2/settings.xml

cache:
  paths:
    - .m2/repository
  key: "$CI_JOB_NAME" # Identificador único para evitar conflictos.

build:
  stage: build
  script:
      - echo "Build"
      - 'mvn $MAVEN_CLI_OPTS clean install --settings ci_settings.xml'

test:
  stage: test
  script:
    - echo "Test"
    - 'mvn $MAVEN_CLI_OPTS clean test'