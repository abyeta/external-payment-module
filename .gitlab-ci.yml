variables:
  MAVEN_CLI_OPTS: >-
    --batch-mode
    --errors
    --fail-at-end
    --show-version
    --no-transfer-progress
    -DinstallAtEnd=true
    -DdeployAtEnd=true
    -U
    -X

image: maven:3-openjdk-17

stages:
  - build
  - test

before_script:
  - mkdir -p ~/.m2
  - echo "<settings>
      <servers>
        <server>
          <id>commons-module-repo</id>
          <username>${MAVEN_USERNAME}</username>
          <password>${MAVEN_PASSWORD}</password>
        </server>
        <server>
          <id>transaction-module-repo</id>
          <username>${MAVEN_USERNAME}</username>
          <password>${MAVEN_PASSWORD}</password>
        </server>
      </servers>
    </settings>" > ~/.m2/settings.xml

cache:
  paths:
    - .m2/repository
  key: "$CI_JOB_NAME"

build:
  stage: build
  script:
    - echo "Build"
    - mvn $MAVEN_CLI_OPTS clean install --settings ~/.m2/settings.xml
#
test:
  stage: test
  script:
    - echo "Test"
    - mvn $MAVEN_CLI_OPTS clean test --settings ~/.m2/settings.xml