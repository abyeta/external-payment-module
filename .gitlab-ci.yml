image: maven:3.8.4-openjdk-17

stages:
  - build
  - test

before_script:
  - echo "Configurando el entorno de Maven..."
  - mvn --version
  - java -version

# Etapa de construcción del módulo principal
build:
  stage: build
  script:
    - echo "Construyendo el módulo principal..."
    - mvn clean package

# Etapa de pruebas unitarias
test:
  stage: test
  script:
    - echo "Ejecutando pruebas unitarias..."
    - mvn test
