image: maven:3.9.6-eclipse-temurin-17

variables:
  GITLAB_TOKEN: "glpat-gmtp2CsLFQGZp68WEvBG"
  MAVEN_CLI_OPTS: "-B -q"
  MAVEN_USER_HOME: "$CI_PROJECT_DIR/.m2"

cache:
  key: maven-repo
  paths:
    - .m2/repository

stages:
  - clean-compile
  - test
  - build
  - release

external-payment-compile:
  stage: clean-compile
  script:
    - git clone https://oauth2:${GITLAB_TOKEN}@gitlab.com/jala-university1/cohort-4/oficial-es-desarrollo-de-software-2-cssd-125.ga.t1.25.m2/secci-n-a/capstone.git
    - cd capstone/commons-module
    - mvn $MAVEN_CLI_OPTS clean install
    - cd ../account-module
    - mvn $MAVEN_CLI_OPTS clean install
    - cd ../external-payment-module
    - mvn $MAVEN_CLI_OPTS clean compile
  artifacts:
    paths:
      - .m2/repository
      - capstone/external-payment-module
    expire_in: 1 hour

external-payment-test:
  stage: test
  needs: ['external-payment-compile']
  dependencies:
    - external-payment-compile
  script:
    - cd capstone/external-payment-module
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    paths:
      - .m2/repository
      - capstone/external-payment-module
    expire_in: 1 hour

external-payment-build:
  stage: build
  needs: ['external-payment-test']
  dependencies:
    - external-payment-test
  script:
    - cd capstone/external-payment-module
    - mvn $MAVEN_CLI_OPTS package
  artifacts:
    paths:
      - capstone/external-payment-module/target/*.jar
    expire_in: 30 days
