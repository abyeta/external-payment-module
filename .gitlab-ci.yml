variables:
  MAVEN_CLI_OPTS: >-
    --batch-mode
    --errors
    --fail-at-end
    --show-version
    --no-transfer-progress
    -DinstallAtEnd=true
    -DdeployAtEnd=true
    -U
    -X

image: maven:3-openjdk-17

stages:
  - build
  - test

cache:
  paths:
    - .m2/repository
  key: "$CI_JOB_NAME"

build:
  stage: build
  script:
    - echo "Build"
    - mvn $MAVEN_CLI_OPTS clean install --settings ci_settings.xml

test:
  stage: test
  script:
    - echo "Test"
    - mvn $MAVEN_CLI_OPTS test --settings ci_settings.xml